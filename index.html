<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Codex Jarvis</title>
</head>
<body>
    <button onclick="startVoice()">কথা বলুন</button>
    <script>
        function startVoice() {
            const recognition = new webkitSpeechRecognition();
            recognition.onresult = (event) => {
                let text = event.results[0][0].transcript;
                fetch('/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({command: text})
                }).then(r => r.json()).then(data => {
                    alert("জারভিস: " + data.answer);
                });
            };
            recognition.start();
        }
    </script>
</body>
</html>
